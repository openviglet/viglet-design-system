name: Publish to npm

on:
  push:
    branches:
      - '2026.2'
    paths-ignore:
      - '*.md'
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@viglet'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump to next available version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          while npm view "${{ github.event.repository.name }}" versions --json 2>/dev/null | grep -q "\"$VERSION\""; do
            echo "Version $VERSION already exists on npm, bumping again..."
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done
          echo "Will publish version: $VERSION"

      - name: Commit and push version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version")"
          git push

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
